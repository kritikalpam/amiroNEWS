// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    ext {
        androidx_core_version = '1.13.1'
        androidx_appcompat_version = '1.7.0'
        androidx_exifinterface_version = '1.3.7'
        capacitor_android_version = '6.2.1'
        cordova_android_version = '12.0.1'
        androidx_activity_version = '1.9.1'
        androidx_coordinatorlayout_version = '1.2.0'
        androidx_browser_version = '1.8.0'
        material_version = '1.12.0'
        play_services_location_version = '21.3.0'
        firebase_messaging_version = '24.0.0'
    }

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.5.1"
        classpath "com.google.gms:google-services:4.4.2"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
